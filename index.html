<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Evaluation</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.jpg">
    <meta name="theme-color" content="#1a1a1a">
    
    <style>
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .container {
            max-width: 450px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        h2 {
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            position: relative;
            display: inline-block;
            width: 100%;
        }
        
        h2:after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #ff4444, #ff8888);
            border-radius: 2px;
        }
        
        .form-label {
            color: #e0e0e0;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 12px 15px;
            color: #ffffff;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ff4444;
            box-shadow: 0 0 0 3px rgba(255, 68, 68, 0.2);
            color: #ffffff;
            outline: none;
        }
        
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
        }
        
        /* Only this button remains red */
        .btn-red {
            background: linear-gradient(45deg, #ff4444, #ff6666);
            color: white;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 68, 68, 0.3);
            margin-top: 10px;
        }
        
        .btn-red:hover {
            background: linear-gradient(45deg, #ff3333, #ff5555);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 68, 68, 0.4);
        }
        
        .btn-red:active {
            transform: translateY(0);
        }

        .result-box {
            margin-top: 25px;
            text-align: center;
            font-weight: bold;
            font-size: 1.3rem;
            padding: 15px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Input number spinners styling */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            opacity: 0.5;
            background: #ffffff;
        }
        
        /* Card effect for inputs */
        .mb-3, .mb-4 {
            position: relative;
        }
        
        /* Animated background effect */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255, 68, 68, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        /* Responsive adjustments */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
                margin: 10px;
            }
            
            h2 {
                font-size: 1.8rem;
            }
        }
        
        /* Success/Error message animations */
        .result-box {
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 class="text-center">Evaluation Form</h2>
        
        <div class="mb-3">
            <label class="form-label">Teacher Name</label>
            <input type="text" class="form-control" id="teacherInput" placeholder="Enter teacher name">
        </div>

        <div class="mb-4">
            <label class="form-label">Rating (0-100)</label>
            <input type="number" class="form-control" id="scoreInput" placeholder="Enter score" min="0" max="100">
        </div>

        <button class="btn btn-red" onclick="processEvaluation()">
            Submit Evaluation
        </button>

        <div id="result" class="result-box"></div>
    </div>

    <script>
        function processEvaluation() {
            const name = document.getElementById('teacherInput').value.trim();
            const score = document.getElementById('scoreInput').value;
            const resultDiv = document.getElementById('result');

            if (name === "" || score === "") {
                resultDiv.innerText = "⚠️ Please fill in all fields.";
                resultDiv.style.color = "#ffaa00";
                return;
            }

            if (score < 0 || score > 100) {
                resultDiv.innerText = "⚠️ Please enter a score between 0 and 100.";
                resultDiv.style.color = "#ffaa00";
                return;
            }

            if (score <= 50) {
                resultDiv.innerText = `👎 Teacher ${name}: mahina ka`;
                resultDiv.style.color = "#ff6b6b";
            } else {
                resultDiv.innerText = `👍 Teacher ${name}: nice ya`;
                resultDiv.style.color = "#6bff6b";
            }
        }

        // Register service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registered');
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
        
        // Add enter key support
        document.getElementById('scoreInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                processEvaluation();
            }
        });
        
        document.getElementById('teacherInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('scoreInput').focus();
            }
        });
    </script>
</body>
</html>
